<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문서 보기</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --line: #d8dfeb;
      --ink: #171b22;
      --muted: #667287;
      --blue: #3157e0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }
    .actions { display: flex; gap: 10px; }
    button {
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }
    button.primary {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }
    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 16px;
      padding: 16px;
      min-height: 0;
    }
    .panel {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
    }
    h1, h2, h3 { margin: 0 0 12px; }
    textarea {
      width: 100%;
      height: 100%;
      resize: none;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font: 14px/1.55 Consolas, monospace;
    }
    .preview {
      overflow: auto;
      line-height: 1.7;
    }
    .preview h1, .preview h2, .preview h3 { margin-top: 1.4em; }
    .preview pre {
      overflow: auto;
      padding: 12px;
      border-radius: 14px;
      background: #0f1520;
      color: #f3f6fb;
    }
    .preview code {
      padding: 1px 5px;
      border-radius: 8px;
      background: #eef3f9;
    }
    .preview ul { padding-left: 22px; }
    .muted { color: var(--muted); }
    @media (max-width: 1100px) {
      .workspace { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1 id="doc-title">문서 로딩 중</h1>
        <p id="doc-path" class="muted"></p>
      </div>
      <div class="actions">
        <button id="reload-btn" type="button">새로고침</button>
        <button id="save-btn" class="primary" type="button">저장</button>
      </div>
    </header>
    <main class="workspace">
      <section class="panel">
        <h2>편집</h2>
        <textarea id="editor"></textarea>
      </section>
      <section class="panel">
        <h2>미리보기</h2>
        <div id="preview" class="preview"></div>
      </section>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const pathParam = params.get("path") || "";
    const titleEl = document.getElementById("doc-title");
    const pathEl = document.getElementById("doc-path");
    const editorEl = document.getElementById("editor");
    const previewEl = document.getElementById("preview");
    document.getElementById("reload-btn").addEventListener("click", loadDoc);
    document.getElementById("save-btn").addEventListener("click", saveDoc);
    editorEl.addEventListener("input", renderPreview);

    loadDoc();

    async function loadDoc() {
      const response = await fetch(`/api/references/file?path=${encodeURIComponent(pathParam)}`, { cache: "no-store" });
      const result = await response.json();
      if (!result.ok) {
        titleEl.textContent = "문서를 찾을 수 없음";
        pathEl.textContent = pathParam;
        previewEl.innerHTML = `<p>${escapeHtml(result.message || "문서를 읽지 못했습니다.")}</p>`;
        return;
      }
      titleEl.textContent = result.path.split("/").pop();
      pathEl.textContent = result.path;
      editorEl.value = result.content || "";
      renderPreview();
    }

    async function saveDoc() {
      const response = await fetch("/api/references/file", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ path: pathParam, content: editorEl.value }),
      });
      const result = await response.json();
      if (!result.ok) {
        window.alert(result.message || "저장에 실패했습니다.");
        return;
      }
      window.alert("저장했습니다.");
    }

    function renderPreview() {
      previewEl.innerHTML = markdownToHtml(editorEl.value);
    }

    function markdownToHtml(markdown) {
      const lines = String(markdown || "").replace(/\r/g, "").split("\n");
      const html = [];
      let inCode = false;
      let inList = false;

      for (const rawLine of lines) {
        const line = rawLine || "";
        if (line.startsWith("```")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(inCode ? "</code></pre>" : "<pre><code>");
          inCode = !inCode;
          continue;
        }
        if (inCode) {
          html.push(escapeHtml(line) + "\n");
          continue;
        }
        if (!line.trim()) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          continue;
        }
        if (line.startsWith("# ")) {
          if (inList) html.push("</ul>");
          inList = false;
          html.push(`<h1>${inline(line.slice(2))}</h1>`);
          continue;
        }
        if (line.startsWith("## ")) {
          if (inList) html.push("</ul>");
          inList = false;
          html.push(`<h2>${inline(line.slice(3))}</h2>`);
          continue;
        }
        if (line.startsWith("### ")) {
          if (inList) html.push("</ul>");
          inList = false;
          html.push(`<h3>${inline(line.slice(4))}</h3>`);
          continue;
        }
        if (line.startsWith("- ")) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${inline(line.slice(2))}</li>`);
          continue;
        }
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
        html.push(`<p>${inline(line)}</p>`);
      }

      if (inList) html.push("</ul>");
      if (inCode) html.push("</code></pre>");
      return html.join("");
    }

    function inline(value) {
      return escapeHtml(value).replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
