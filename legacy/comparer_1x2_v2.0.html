<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLS 실시간 비교 뷰어 (2분할 + 세로 모니터링)</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000; color: #fff;
      font-family: 'Inter', Arial, sans-serif;
      overflow: hidden;
    }

    #monitor-container {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      border-bottom: 1px solid #222;
      height: 130px;
    }

    .monitor-ui {
      flex: 1;
      background: rgba(15,15,15,0.95);
      padding: 6px 10px;
      font-family: monospace;
      font-size: 11px;
      display: none;
      overflow-y: auto;
    }
    .monitor-header {
      font-size: 12px;
      color: #0af;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .seg-list {
      display: flex;
      flex-direction: column-reverse; /* 최신 위로 */
      gap: 2px;
    }
    .seg-item {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid #0af;
      border-radius: 3px;
      padding: 2px 6px;
      white-space: nowrap;
      font-size: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ddd;
      transition: background 0.2s;
    }
    .seg-item:hover {
      background: rgba(0,170,255,0.25);
    }

    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.9);
      border: 1px solid #0af;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 11px;
      display: none;
      pointer-events: none;
      z-index: 1000;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 130px);
      width: 100vw;
    }
    .video-box {
      position: relative;
      overflow: hidden;
      border: 1px solid #222;
      background: #000;
    }
    video {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #000;
      transition: transform 0.1s linear;
      pointer-events: none;
    }

    .filename-label {
      position: absolute; top: 8px; left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px; border-radius: 6px;
      font-size: 12px; color: #bbb;
      z-index: 5; user-select: none; pointer-events: none;
    }
    .corner-number {
      position: absolute; bottom: 8px; left: 10px;
      font-size: 36px; font-weight: bold;
      color: rgba(255,255,255,0.6);
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
      z-index: 5; user-select: none;
    }

    .input-modal {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20,20,20,0.9);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px; width: 220px;
      display: none; flex-direction: column;
      gap: 8px; z-index: 6;
    }
    .video-box:hover:not(.loaded) .input-modal { display: flex; }
    .drop-zone {
      border: 2px dashed #555; border-radius: 6px;
      padding: 12px; text-align: center; font-size: 13px;
      color: #aaa; cursor: pointer; background: rgba(255,255,255,0.05);
      transition: border-color 0.2s;
    }
    .drop-zone:hover { border-color: #0af; color: #0af; }
    input.url-input {
      width: 100%; padding: 6px;
      border-radius: 4px; border: 1px solid #555;
      background: #111; color: #eee; font-size: 13px;
    }
    .video-box.loaded { cursor: zoom-in; }

    .help {
      position: fixed; top: 8px; right: 10px;
      font-size: 12px; color: #bbb;
      background: rgba(0,0,0,0.5);
      padding: 6px 8px; border-radius: 6px;
      opacity: 0.5; transition: opacity 0.3s;
      user-select: none; z-index: 10;
    }
    .help:hover { opacity: 1; }
  </style>
</head>
<body>

  <!-- 상단 HLS 모니터링 -->
  <div id="monitor-container">
    <div class="monitor-ui" id="monitor1">
      <div class="monitor-header">📡 Player 1 HLS Monitor</div>
      <div class="seg-list" id="seglist1"></div>
    </div>
    <div class="monitor-ui" id="monitor2">
      <div class="monitor-header">📡 Player 2 HLS Monitor</div>
      <div class="seg-list" id="seglist2"></div>
    </div>
  </div>

  <div class="grid">
    <div class="video-box" id="box1">
      <div class="filename-label" id="label1"></div>
      <div class="corner-number">1</div>
      <video id="video1"></video>
      <div class="input-modal">
        <div class="drop-zone">🎬 파일을 드래그하거나 클릭</div>
        <input class="url-input" type="text" placeholder="URL (.m3u8) 입력 후 Enter" />
        <input type="file" accept="video/*" style="display:none" />
      </div>
    </div>

    <div class="video-box" id="box2">
      <div class="filename-label" id="label2"></div>
      <div class="corner-number">2</div>
      <video id="video2"></video>
      <div class="input-modal">
        <div class="drop-zone">🎬 파일을 드래그하거나 클릭</div>
        <input class="url-input" type="text" placeholder="URL (.m3u8) 입력 후 Enter" />
        <input type="file" accept="video/*" style="display:none" />
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="help">
    ⎵ Space: 재생/정지<br>
    R: 타임싱크<br>
    F: 전체화면(전체)<br>
    1–2: 해당 화면 전체화면<br>
    ← / → : 프레임 이동<br>
    ⇧ + ← / → : 10프레임 이동<br>
    ⇧ + < / > : 재생속도 조절<br>
    🖱 휠: 확대/축소
  </div>

  <script>
    const videos = [1,2].map(i=>document.getElementById("video"+i));
    const boxes = [1,2].map(i=>document.getElementById("box"+i));
    const labels = [1,2].map(i=>document.getElementById("label"+i));
    const monitors = [1,2].map(i=>document.getElementById("monitor"+i));
    const segLists = [1,2].map(i=>document.getElementById("seglist"+i));
    const tooltip = document.getElementById("tooltip");
    const segHistory = [[],[]];

    let isPlaying=false, zoom=2, zoomedIn=false;

    boxes.forEach((box,i)=>{
      const video=videos[i],label=labels[i];
      const dropZone=box.querySelector(".drop-zone");
      const fileInput=box.querySelector('input[type=file]');
      const urlInput=box.querySelector(".url-input");

      dropZone.addEventListener("click",()=>fileInput.click());
      fileInput.addEventListener("change",e=>handleFile(e.target.files[0],video,label,box));

      urlInput.addEventListener("keydown",e=>{
        if(e.key==="Enter"){
          const url=e.target.value.trim();
          if(url) handleURL(url,video,label,box,i);
        }
      });

      box.addEventListener("dragover",e=>e.preventDefault());
      box.addEventListener("drop",e=>{
        e.preventDefault();
        const dt=e.dataTransfer;
        if(dt.files.length>0) handleFile(dt.files[0],video,label,box);
        else{
          const url=dt.getData("text")||dt.getData("text/plain");
          if(url) handleURL(url.trim(),video,label,box,i);
        }
      });

      box.addEventListener("mousemove",e=>handleZoomMove(e,box));
      box.addEventListener("wheel",e=>{
        if(!box.classList.contains("loaded"))return;
        e.preventDefault();
        zoom+=e.deltaY*-0.01;
        zoom=Math.min(Math.max(zoom,1),5);
        applyZoom(true);
      });
      box.addEventListener("click",()=>{
        if(!box.classList.contains("loaded"))return;
        zoomedIn=!zoomedIn;
        box.style.cursor=zoomedIn?"zoom-out":"zoom-in";
        applyZoom(zoomedIn);
      });
    });
    
    function handleFile(file,video,label,box){
      if(file&&file.type.startsWith("video/")){
        const url=URL.createObjectURL(file);
        video.src=url; video.loop=true; video.play();
        label.textContent=file.name;
        box.classList.add("loaded");
      }
    }

    function handleURL(url,video,label,box,index){
      label.textContent=url;
      box.classList.add("loaded");
      if(url.endsWith(".m3u8")){
        monitors[index].style.display="block";
        if(Hls.isSupported()){
          const hls=new Hls();
          setupHlsEvents(hls,index);
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
        }else if(video.canPlayType("application/vnd.apple.mpegurl")){
          video.src=url; video.play();
        }else alert("HLS 재생을 지원하지 않는 브라우저입니다.");
      }else{
        monitors[index].style.display="none";
        video.src=url; video.play();
      }
    }

    function setupHlsEvents(hls,index){
      monitors[index].style.display="block";
      // 다운로드 시작
      hls.on(Hls.Events.FRAG_LOADING, (event, data) => {
        if (!data.frag) return;
        const fragUrl = data.frag.url || data.frag.relurl;
        console.log(`⬇️ [Player${index+1}] #${data.frag.sn} loading...`);
        console.log(`   ➜ TS URL: ${fragUrl}`);
      });

      // 다운로드 완료 시점
      hls.on(Hls.Events.FRAG_LOADED, (event, data) => {
        if (!data.frag || !data.stats) return;
        const sn = data.frag.sn ?? segHistory[index].length;
        const duration = data.frag.duration?.toFixed(2) ?? "0";
        const total = data.stats.total ?? 0;
        const tload = data.stats.tload ?? 0;
        const trequest = data.stats.trequest ?? 0;
        const elapsed = (tload || performance.now()) - (trequest || performance.now());
        const speed = elapsed > 0 ? ((total * 8) / elapsed / 1024).toFixed(1) : 0;

        const seg = {
          sn,
          dur: duration,
          size: total ? (total / 1024 / 1024).toFixed(2) : "0",
          speed: Number(speed),
          start: trequest,
          end: tload
        };

        segHistory[index].push(seg);
        if (segHistory[index].length > 50) segHistory[index].shift();
        updateMonitor(index);

        console.log(`✅ [Player${index+1}] #${seg.sn} (${seg.dur}s, ${seg.size}MB, ${seg.speed}kbps)`);
      });


      hls.on(Hls.Events.FRAG_BUFFERED,(event,data)=>{
        if(!data.frag || !data.stats) return;
        const sn=data.frag.sn ?? segHistory[index].length;
        const duration=data.frag.duration?.toFixed(2) ?? "0";
        const total=data.stats.total ?? 0;
        const tload=data.stats.tload ?? 0;
        const trequest=data.stats.trequest ?? 0;
        const elapsed=(tload||performance.now())-(trequest||performance.now());
        const speed=elapsed>0?((total*8)/elapsed/1024).toFixed(1):0;

        const seg={
          sn,
          dur:duration,
          size: total ? (total/1024/1024).toFixed(2) : "0",
          speed: Number(speed),
          start:trequest,
          end:tload
        };

        segHistory[index].push(seg);
        if(segHistory[index].length>50) segHistory[index].shift();
        updateMonitor(index);
      });
    }

    function updateMonitor(i){
      const target=segLists[i];
      if(!target) return;
      const list=segHistory[i];
      if(!list||list.length===0){
        target.innerHTML=`<div style="color:#666;">(아직 세그먼트 데이터 없음)</div>`;
        return;
      }
      const html=list.slice(-30).map(seg=>{
        const color=seg.speed>800?'#0f0':seg.speed>400?'#ff0':'#0af';
        const latency=seg.end&&seg.start?Math.round(seg.end-seg.start):0;
        const speedInfo=seg.speed>0?`<span style="color:${color};">${seg.speed}kbps</span>`:"";
        return `
          <div class="seg-item" style="border-left-color:${color}"
            data-sn="${seg.sn}" data-dur="${seg.dur}" data-size="${seg.size}" data-lat="${latency}">
            <span>#${seg.sn}</span>
            <span>${seg.dur}s • ${seg.size}MB ${speedInfo}</span>
          </div>`;
      }).join("");
      target.innerHTML=html;
    }

    document.addEventListener("mousemove",e=>{
      if(e.target.classList.contains("seg-item")){
        const seg=e.target.dataset;
        tooltip.innerHTML=`#${seg.sn}<br>
          ${seg.dur}s<br>
          ${seg.size}MB | ${seg.lat}ms`;
        tooltip.style.display="block";
        tooltip.style.left=e.pageX+10+"px";
        tooltip.style.top=e.pageY-20+"px";
      } else tooltip.style.display="none";
    });

    function handleZoomMove(e,box){
      const rect=box.getBoundingClientRect();
      const xPercent=((e.clientX-rect.left)/rect.width)*100;
      const yPercent=((e.clientY-rect.top)/rect.height)*100;
      videos.forEach(v=>v.style.transformOrigin=`${xPercent}% ${yPercent}%`);
    }
    function applyZoom(active){
      videos.forEach(v=>v.style.transform=active?`scale(${zoom})`:"scale(1)");
    }

    document.addEventListener("keydown",e=>{
      const k=e.key.toLowerCase();
      if(e.code==="Space"){ e.preventDefault(); togglePlay(); }
      else if(k==="r") syncAll();
      else if(k==="f") toggleFullscreen();
      else if(["1","2"].includes(k)) toggleFullscreen(boxes[parseInt(k)-1]);
      else if(k==="arrowright"||k==="arrowleft") stepFrames(e.shiftKey,k==="arrowright");
      else if(k===">"||k===".") adjustSpeed(0.1);
      else if(k===","||k==="<") adjustSpeed(-0.1);
    });

    function togglePlay(){
      isPlaying=!isPlaying;
      videos.forEach(v=>isPlaying?v.play():v.pause());
    }
    function syncAll(){
      const t=videos[0].currentTime;
      videos.forEach((v,i)=>{ if(i>0&&v.src) v.currentTime=t; });
    }
    function toggleFullscreen(target=document.documentElement){
      if(!document.fullscreenElement) target.requestFullscreen();
      else document.exitFullscreen();
    }
    function stepFrames(shift,forward){
      const step=(shift?10:1)/30;
      videos.forEach(v=>{ if(!v.paused) v.pause(); v.currentTime+=forward?step:-step; });
    }
    function adjustSpeed(delta){
      videos.forEach(v=>v.playbackRate=Math.min(Math.max(v.playbackRate+delta,0.1),4));
    }
  </script>
</body>
</html>
